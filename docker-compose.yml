services:
  db:
    image: postgres:16
    container_name: threatwatch-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_dev_password  # Feel free to change this
      POSTGRES_DB: threatwatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
